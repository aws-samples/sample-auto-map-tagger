name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx vitest run
      - run: node scripts/build.js
      - run: node scripts/verify-build.js

      - name: Check configurator.html is up to date
        run: |
          if ! git diff --quiet configurator.html; then
            echo "::error::configurator.html is stale. Run 'npm run build' and commit the result."
            git diff --stat configurator.html
            exit 1
          fi
