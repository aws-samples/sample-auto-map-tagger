    permissions:
      id-token: write
      contents: read
    outputs:
      vpc-id: ${{ steps.create.outputs.vpc-id }}
      subnet-ids: ${{ steps.create.outputs.subnet-ids }}
      sg-id: ${{ steps.create.outputs.sg-id }}
    steps:
      - uses: actions/checkout@v4

