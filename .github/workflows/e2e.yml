        run: |
          python3 create_resources.py \
            --group networking \
            --region ap-northeast-2

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arns-networking
          path: .github/scripts/created-arns-networking.json
          if-no-files-found: warn

