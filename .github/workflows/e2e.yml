  verify-scope-date:
    name: "[Scope] Verify pre-agreement resource is NOT tagged"
    runs-on: ubuntu-latest
    needs: [create-scope-date]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
