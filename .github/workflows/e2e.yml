  # ══════════════════════════════════════════════════════════════════════════
  # Phase 3 — Verify tags (runs after all create jobs)
  # ══════════════════════════════════════════════════════════════════════════

  verify:
    name: Verify map-migrated tags
    runs-on: ubuntu-latest
    needs:
      - create-networking
      - create-core
      - create-databases
      - create-analytics
      - create-integration
      - create-security
      - create-devtools
      - create-ml
      - create-media-iot
      - create-misc
      - create-global-us-east-1
      - create-global-us-west-2
      - create-multiaccount-linked1
      - create-multiaccount-linked2
      - create-multiaccount-linked3
      - create-multiaccount-linked4
      - create-multiaccount-linked5
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_SINGLE_ACCOUNT_ID }}:role/GitHubActionsE2ERole
          aws-region: ap-northeast-2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install boto3

      # Download all ARN artifact files into a single directory
      - uses: actions/download-artifact@v4
        with:
          pattern: arns-*
          path: artifacts/
          merge-multiple: true

      - name: List downloaded ARN files
        run: ls -la artifacts/ || echo "No artifacts directory"
        working-directory: .

      - name: Verify tags on all resources
        run: |
          python3 verify_tags.py \
            --arns-dir ../../artifacts/ \
            --tag-key map-migrated \
            --tag-value "$MPE_ID" \
            --max-wait 900 \
            --poll-interval 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-report
          path: .github/scripts/verification-report.json
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════════════════════
  # Phase 4 — Teardown (always runs, even on failure)
  # ══════════════════════════════════════════════════════════════════════════

  teardown:
    name: Teardown all E2E resources
    runs-on: ubuntu-latest
    if: always()
    needs:
      - verify
      - create-networking
      - create-core
      - create-databases
      - create-analytics
      - create-integration
      - create-security
      - create-devtools
      - create-ml
      - create-media-iot
      - create-misc
      - create-global-us-east-1
      - create-global-us-west-2
      - create-multiaccount-linked1
      - create-multiaccount-linked2
      - create-multiaccount-linked3
      - create-multiaccount-linked4
      - create-multiaccount-linked5
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_SINGLE_ACCOUNT_ID }}:role/GitHubActionsE2ERole
          aws-region: ap-northeast-2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install boto3

      # Download all ARN records so teardown knows what to delete
      - uses: actions/download-artifact@v4
        with:
          pattern: arns-*
          path: artifacts/
          merge-multiple: true
        continue-on-error: true

      - name: Delete test resources
        run: |
          python3 teardown.py \
            --arns-dir ../../artifacts/ \
            --pr "$PR_NUMBER" \
            --tag-value "$MPE_ID"
        continue-on-error: true

      - name: Delete single-account CloudFormation stack
        working-directory: .
        run: |
          aws cloudformation delete-stack --stack-name "$STACK_NAME" || true
          echo "Stack deletion initiated (not waiting for completion)"
        continue-on-error: true

      - name: Delete multi-account StackSet
        run: |
